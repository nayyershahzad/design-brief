name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  remix-deletable:
    name: builds without the optional remix package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Prove the M4 isolation guarantee: with remix gone, the rest still builds + tests.
      - run: rm -rf packages/remix node_modules/@design-brief/remix
      - run: npm run build
      - run: npm run test -w @design-brief/core
